<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Follow the Sun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4f8; --white:#fff; --blue:#1a6bb5; --blue2:#2481d7;
  --blue-lt:#e8f1fb; --sky:linear-gradient(160deg,#1a6bb5 0%,#2e9cdf 100%);
  --text:#1a1f2e; --text2:#4a5568; --muted:#8a96a8; --border:#e4eaf2;
  --shadow:0 4px 24px rgba(26,107,181,0.10); --shadow2:0 2px 12px rgba(0,0,0,0.08);
  --r:20px; --r-sm:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

/* HERO */
.hero{position:relative;height:260px;background:linear-gradient(180deg,rgba(10,30,70,0.15) 0%,rgba(10,30,70,0.55) 100%),url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=900&q=80') center/cover no-repeat;display:flex;flex-direction:column;justify-content:flex-end;padding:0 22px 28px;}
.hero-greeting{font-size:.78rem;color:rgba(255,255,255,.75);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.hero-title{font-family:'Playfair Display',serif;font-size:2rem;color:#fff;line-height:1.2;font-weight:700;}
.hero-title em{font-style:italic;font-weight:600;}
.hero-badge{position:absolute;top:22px;right:22px;background:rgba(255,255,255,.22);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.3);border-radius:99px;padding:7px 14px;font-size:.75rem;color:#fff;font-weight:600;display:flex;align-items:center;gap:6px;}

/* SCROLL BODY */
.scroll-body{padding:20px 16px 80px;max-width:480px;margin:0 auto;}
.sec-label{font-size:.65rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.sec-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:4px;}
.sec-sub{font-size:.78rem;color:var(--text2);margin-bottom:16px;}

/* JOYSTICK CARD */
.jcard{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
.arena{position:relative;width:260px;height:260px;margin:0 auto 16px;border-radius:50%;background:radial-gradient(circle at 50% 50%,#eaf3fc 0%,#d8eaf8 100%);}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(36,129,215,.18);top:50%;left:50%;transform:translate(-50%,-50%);}
.r4{width:240px;height:240px;} .r3{width:180px;height:180px;} .r2{width:120px;height:120px;} .r1{width:60px;height:60px;}
/* Zone labels centered at top of each ring — center at 130px, radii: 30/60/90/120px */
.ztick{position:absolute;font-size:.55rem;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;pointer-events:none;white-space:nowrap;left:50%;transform:translateX(-50%);}
.zt-nah   {top:calc(130px - 30px + 4px);}   /* top of r1 ring + small padding */
.zt-mittel{top:calc(130px - 60px + 4px);}   /* top of r2 ring */
.zt-weit  {top:calc(130px - 90px + 4px);}   /* top of r3 ring */
.zt-sehr  {top:calc(130px - 120px + 4px);}  /* top of r4 ring */
#jh{position:absolute;width:48px;height:48px;border-radius:50%;background:var(--sky);box-shadow:0 4px 16px rgba(36,129,215,.45);left:130px;top:130px;transform:translate(-50%,-50%);cursor:grab;display:flex;align-items:center;justify-content:center;transition:box-shadow .15s;touch-action:none;z-index:10;}
#jh:hover{box-shadow:0 6px 20px rgba(36,129,215,.55);}
#jh.dragging{cursor:grabbing;box-shadow:0 8px 24px rgba(36,129,215,.6);}
.zread{min-height:44px;text-align:center;}
.zread-name{font-size:1.6rem;font-weight:800;color:var(--blue2);line-height:1;}
.zread-detail{font-size:.75rem;color:var(--text2);margin-top:4px;}
.zread-hint{font-size:.8rem;color:var(--muted);}

/* HEUTE/MORGEN SLIDER */
.day-slider-wrap{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:20px;}
.day-slider-label{font-size:.75rem;font-weight:800;color:var(--text2);}
.day-slider-label.active{color:var(--blue2);}
.day-toggle{position:relative;width:48px;height:26px;background:#d0dcea;border-radius:99px;cursor:pointer;border:none;transition:background .2s;flex-shrink:0;}
.day-toggle.morgen{background:var(--blue2);}
.day-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .2s;}
.day-toggle.morgen::after{transform:translateX(22px);}

/* DEST CARD */
#sec-weather{display:none;margin-bottom:20px;}
#sec-weather.show{display:block;animation:slideUp .45s cubic-bezier(.22,1,.36,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.dest-card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.dest-img{position:relative;height:180px;background:#c8d8ea center/cover no-repeat;overflow:hidden;}
.dest-img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.55) 100%);}
.dest-img-label{position:absolute;bottom:14px;left:16px;right:16px;display:flex;align-items:flex-end;justify-content:space-between;}
.dest-img-name{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:#fff;line-height:1.1;}
.dest-img-travel{font-size:.7rem;color:rgba(255,255,255,.85);background:rgba(0,0,0,.3);backdrop-filter:blur(6px);padding:4px 10px;border-radius:99px;font-weight:600;white-space:nowrap;}
.dest-row{padding:16px 18px 6px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dest-row-left{flex:1;min-width:0;}
.dest-row-name{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dest-row-travel{font-size:.7rem;color:var(--muted);margin-top:2px;font-weight:600;}
.dest-best-badge{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;background:#fff8e6;color:#c07010;border:1px solid #f0d080;border-radius:99px;padding:3px 9px;margin-top:5px;}

/* DROPDOWN */
.dest-dropdown-wrap{position:relative;flex-shrink:0;}
.dest-dropdown-btn{display:flex;align-items:center;gap:6px;background:var(--blue-lt);border:2px solid var(--border);border-radius:var(--r-sm);padding:9px 13px;font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:800;color:var(--blue2);cursor:pointer;transition:border-color .15s,background .15s;white-space:nowrap;}
.dest-dropdown-btn:hover{border-color:var(--blue2);background:#d8ecfa;}
.dest-dropdown-btn svg{transition:transform .2s;}
.dest-dropdown-btn.open svg{transform:rotate(180deg);}
.dest-dropdown-menu{
  display:none;
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:var(--white);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  width:240px;
  z-index:999;
  max-height:60vh;
  overflow-y:auto;
}
.dest-dropdown-menu.open{display:block;animation:dropIn .18s cubic-bezier(.22,1,.36,1) both;}
/* Make sure parent card doesn't clip the dropdown */
.dest-card{overflow:visible !important;}
.dest-row{overflow:visible;position:relative;z-index:10;}
@keyframes dropIn{from{opacity:0;transform:translateY(-8px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.dropdown-zone-label{font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 14px 5px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;}
.dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;gap:8px;}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:var(--blue-lt);}
.dropdown-item.active{background:#e0f0fc;}
.dropdown-item-name{font-size:.83rem;font-weight:700;color:var(--text);}
.dropdown-item-meta{font-size:.65rem;color:var(--muted);margin-top:1px;}
.dropdown-wx{font-size:1rem;flex-shrink:0;}
.dropdown-item.active .dropdown-item-name{color:var(--blue2);}

/* WEATHER STRIP */
.weather-strip{padding:16px 18px 0;}
.weather-head{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:3px;}
.weather-head.sun{color:#e07820;} .weather-head.ok{color:var(--text);} .weather-head.rain{color:#3a70b0;}
.weather-sub{font-size:.78rem;color:var(--text2);margin-bottom:14px;}
.outdoor-btn{display:inline-flex;align-items:center;gap:6px;background:#fff3e0;border:1.5px solid #f0c060;border-radius:99px;padding:7px 14px;font-size:.75rem;font-weight:800;color:#c07010;cursor:pointer;margin-bottom:14px;font-family:'Nunito',sans-serif;transition:background .15s;}
.outdoor-btn:hover{background:#ffe8b0;}
.forecast{display:flex;gap:10px;margin-bottom:16px;}
.fc{flex:1;background:var(--blue-lt);border-radius:var(--r-sm);padding:12px 10px;text-align:center;}
.fc-day{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.fc-icon{font-size:1.7rem;line-height:1;margin-bottom:4px;}
.fc-temp{font-size:.9rem;font-weight:800;color:var(--text);}
.fc-rain{font-size:.63rem;color:#5580aa;margin-top:2px;font-weight:600;}
.fc-rain.dry{color:#4a9a5a;}
.btn-explore{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 36px);margin:0 18px 18px;background:var(--sky);color:#fff;border:none;border-radius:var(--r-sm);padding:15px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(36,129,215,.35);transition:opacity .15s,transform .15s;letter-spacing:.01em;}
.btn-explore:hover{opacity:.9;transform:translateY(-1px);}

/* ACTIVITIES */
#sec-activities{display:none;}
#sec-activities.show{display:block;animation:slideUp .45s .1s cubic-bezier(.22,1,.36,1) both;}
.chips{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:8px 16px;border-radius:99px;font-size:.75rem;font-weight:700;white-space:nowrap;border:2px solid var(--border);background:var(--white);color:var(--text2);font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;box-shadow:var(--shadow2);}
.chip:hover:not(.off){border-color:var(--blue2);color:var(--blue2);}
.chip.on{background:var(--sky);border-color:transparent;color:#fff;box-shadow:0 3px 12px rgba(36,129,215,.3);}
.chip.off{opacity:.35;cursor:default;}
.act-list{display:flex;flex-direction:column;gap:12px;}
.acard{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow2);overflow:hidden;display:flex;transition:transform .18s,box-shadow .18s;animation:slideUp .4s ease both;}
.acard:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.acard-bar{width:6px;flex-shrink:0;}
.bar-natur{background:linear-gradient(180deg,#56b870,#3a9a5a);}
.bar-museum{background:linear-gradient(180deg,#7080cc,#5060b8);}
.bar-essen{background:linear-gradient(180deg,#e89040,#d07020);}
.bar-event{background:linear-gradient(180deg,#c060c0,#a040a0);}
.bar-kinder{background:linear-gradient(180deg,#e0b830,#c09010);}
.acard-body{flex:1;padding:14px 16px 13px;}
.acard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:5px;}
.acard-name{font-size:.92rem;font-weight:800;color:var(--text);line-height:1.2;}
.tag{font-size:.6rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
.tag-natur{background:#e8f7ee;color:#2a7a3a;}
.tag-museum{background:#eaebf8;color:#3040a0;}
.tag-essen{background:#fdf0e0;color:#b05010;}
.tag-event{background:#f5e0f5;color:#802080;}
.tag-kinder{background:#fef9e0;color:#907010;}
.acard-desc{font-size:.78rem;color:var(--text2);line-height:1.5;margin-bottom:10px;}
.acard-btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.abtn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:99px;font-size:.72rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;text-decoration:none;transition:all .15s;}
.abtn-primary{background:var(--blue-lt);color:var(--blue2);border:1.5px solid #c0d8f0;}
.abtn-primary:hover{background:#c8e4f8;}
.abtn-ghost{background:#f5f5f5;color:var(--text2);border:1.5px solid var(--border);}
.abtn-ghost:hover{background:#ebebeb;}
.abtn-refresh{background:transparent;border:none;color:var(--muted);padding:6px;cursor:pointer;border-radius:50%;transition:color .15s,transform .2s;}
.abtn-refresh:hover{color:var(--blue2);transform:rotate(180deg);}
.empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:.85rem;}

/* TAGS */
.tag-natur,.tag-museum,.tag-essen,.tag-event,.tag-kinder{} /* already defined above */

/* ── WEATHER CHART ── */
.wx-chart-wrap{padding:0 18px 16px;}
.wx-chart-label{font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.wx-chart-scroll{overflow-x:auto;scrollbar-width:none;}
.wx-chart-scroll::-webkit-scrollbar{display:none;}
.wx-chart-svg-wrap{min-width:380px;}

/* SUN HOURS BADGE */
.wx-sun-row{display:flex;align-items:center;gap:14px;padding:12px 18px 0;}
.wx-sun-badge{display:flex;align-items:center;gap:6px;font-size:.78rem;font-weight:800;color:#e07820;}
.wx-sun-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.wx-sun-bar{height:100%;background:linear-gradient(90deg,#f5c040,#f09020);border-radius:99px;transition:width .6s cubic-bezier(.22,1,.36,1);}

/* CLOTHING */
.wx-clothing{margin:0 18px 16px;background:var(--blue-lt);border-radius:var(--r-sm);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.wx-clothing-icon{font-size:1.4rem;flex-shrink:0;line-height:1;}
.wx-clothing-text{font-size:.8rem;color:var(--text);font-weight:700;line-height:1.5;}
.wx-clothing-sub{font-size:.72rem;color:var(--text2);font-weight:400;margin-top:2px;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">☀️ Wochenend-Planer</div>
  <div class="hero-greeting">Guten Tag</div>
  <div class="hero-title">Wohin geht<br><em>die Reise heute?</em></div>
</div>

<div class="scroll-body">

  <!-- HEUTE / MORGEN SLIDER -->
  <div class="day-slider-wrap">
    <span class="day-slider-label active" id="lbl-heute">Heute</span>
    <button class="day-toggle" id="day-toggle" onclick="toggleDay()" title="Zwischen Heute und Morgen wechseln"></button>
    <span class="day-slider-label" id="lbl-morgen">Morgen</span>
  </div>

  <!-- SECTION 1: JOYSTICK -->
  <div class="sec-label">Entfernung wählen</div>
  <div class="jcard">
    <div class="arena" id="arena">
      <div class="ring r4"></div><div class="ring r3"></div><div class="ring r2"></div><div class="ring r1"></div>
      <span class="ztick zt-nah">Nah</span>
      <span class="ztick zt-mittel">Mittel</span>
      <span class="ztick zt-weit">Weit</span>
      <span class="ztick zt-sehr">Sehr weit</span>
      <div id="jh"><svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="5" fill="white"/><line x1="13" y1="1" x2="13" y2="5" stroke="white" stroke-width="2.2" stroke-linecap="round"/><line x1="13" y1="21" x2="13" y2="25" stroke="white" stroke-width="2.2" stroke-linecap="round"/><line x1="1" y1="13" x2="5" y2="13" stroke="white" stroke-width="2.2" stroke-linecap="round"/><line x1="21" y1="13" x2="25" y2="13" stroke="white" stroke-width="2.2" stroke-linecap="round"/><line x1="4.2" y1="4.2" x2="7.0" y2="7.0" stroke="white" stroke-width="2.2" stroke-linecap="round"/><line x1="19.0" y1="19.0" x2="21.8" y2="21.8" stroke="white" stroke-width="2.2" stroke-linecap="round"/><line x1="21.8" y1="4.2" x2="19.0" y2="7.0" stroke="white" stroke-width="2.2" stroke-linecap="round"/><line x1="7.0" y1="19.0" x2="4.2" y2="21.8" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg></div>
    </div>
    <div class="zread" id="zread"><div class="zread-hint">Joystick ziehen zum Auswählen</div></div>
  </div>

  <!-- SECTION 2: DESTINATION + WEATHER -->
  <div id="sec-weather">
    <div class="sec-label" id="sec-weather-label">Beste Empfehlung</div>
    <div class="dest-card" id="dest-card"></div>
  </div>

  <!-- SECTION 3: ACTIVITIES -->
  <div id="sec-activities">
    <div class="sec-title" id="acts-title">Aktivitäten</div>
    <div class="sec-sub" id="acts-sub"></div>
    <div class="chips" id="chips">
      <button class="chip on"  data-f="alle"    onclick="setFilter('alle')">Alle</button>
      <button class="chip"     data-f="natur"   onclick="setFilter('natur')">🌿 Natur</button>
      <button class="chip"     data-f="museum"  onclick="setFilter('museum')">🏛 Museum</button>
      <button class="chip"     data-f="essen"   onclick="setFilter('essen')">🍽 Essen</button>
      <button class="chip"     data-f="kinder"  onclick="setFilter('kinder')">👶 Kind</button>
      <!-- Event chip hidden until API integration -->
      <!-- <button class="chip" data-f="event" onclick="setFilter('event')">🎉 Event</button> -->
    </div>
    <div class="act-list" id="act-list"></div>
  </div>

</div>

<script>
/* ═══════════════ IMAGES ═══════════════ */
const DEST_IMAGES = {
  koeln:            'https://images.unsplash.com/photo-1760556719567-6a3bf7dbe911?auto=format&fit=crop&fm=jpg&q=80&w=800',
  bonn:             'https://images.unsplash.com/photo-1683543517797-9c2d4a16786b?auto=format&fit=crop&fm=jpg&q=80&w=800',
  duesseldorf:      'https://images.unsplash.com/photo-1595077101107-4d5ae4ed2401?auto=format&fit=crop&fm=jpg&q=80&w=800',
  siebengebirge:    'https://images.unsplash.com/photo-1757069431176-d5212984195d?auto=format&fit=crop&fm=jpg&q=80&w=800',
  aachen:           'https://images.unsplash.com/photo-1761470129198-97179c08f398?auto=format&fit=crop&fm=jpg&q=80&w=800',
  eifel:            'https://images.unsplash.com/photo-1570372532050-56a0d3531567?auto=format&fit=crop&fm=jpg&q=80&w=800',
  maastricht:       'https://images.unsplash.com/photo-1647273922449-fb98bc3584f1?auto=format&fit=crop&fm=jpg&q=80&w=800',
  'bergisches-land':'https://images.unsplash.com/photo-1755589066709-ec12ec11baa1?auto=format&fit=crop&fm=jpg&q=80&w=800',
  niederrhein:      'https://images.unsplash.com/photo-1572187705418-2edb117e6048?auto=format&fit=crop&fm=jpg&q=80&w=800',
  muenster:         'https://images.unsplash.com/photo-1582525037719-52bbcc080f4e?auto=format&fit=crop&fm=jpg&q=80&w=800',
  koblenz:          'https://images.unsplash.com/photo-1618871551054-9f13828c5795?auto=format&fit=crop&fm=jpg&q=80&w=800',
  mosel:            'https://images.unsplash.com/photo-1641168557574-1345add5d32d?auto=format&fit=crop&fm=jpg&q=80&w=800',
  sauerland:        'https://images.unsplash.com/photo-1601803523667-e4966e534a17?auto=format&fit=crop&fm=jpg&q=80&w=800',
  ruhrgebiet:       'https://images.unsplash.com/photo-1610448300579-2ea96ca0f7ac?auto=format&fit=crop&fm=jpg&q=80&w=800',
  amsterdam:        'https://images.unsplash.com/photo-1682456696065-dfa525bcb352?auto=format&fit=crop&fm=jpg&q=80&w=800',
  rotterdam:        'https://images.unsplash.com/photo-1578719437762-a5c4eae26375?auto=format&fit=crop&fm=jpg&q=80&w=800',
};

/* ═══════════════ DATA ═══════════════
   pool: Gruppenname für Refresh-Button
   poolAll: alle Optionen in dieser Kategorie
   tags: ['primary'] — nur 1 primäres Tag, optional +kinder
   KEIN event-Tag — erst wenn API kommt
══════════════════════════════════════ */

const DAYLIGHT = [8.2,9.5,11.5,13.5,15.2,16.2,15.8,14.5,12.5,10.5,8.8,7.8];
const wxCache = {};
const wxPending = {};

function iconFromWMO(wmo, hour){
  if(wmo===0) return (hour>=7&&hour<=20)?'☀️':'🌙';
  if(wmo<=2)  return '🌤️';
  if(wmo<=3)  return '☁️';
  if(wmo<=48) return '🌫️';
  if(wmo<=67) return '🌧️';
  if(wmo<=77) return '❄️';
  if(wmo<=82) return '🌦️';
  return '⛈️';
}

async function fetchWeather(id, dayOffset){
  const key = id + '_' + dayOffset;
  if(wxCache[key]) return wxCache[key];
  if(wxPending[key]) return wxPending[key];

  const coords = DEST_COORDS[id];
  if(!coords) return fallbackWeather(id, dayOffset);

  const target = new Date();
  target.setDate(target.getDate() + dayOffset);
  const dateStr = target.toISOString().slice(0,10);

  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${coords.lat}&longitude=${coords.lon}`
    + `&hourly=temperature_2m,precipitation_probability,sunshine_duration,weathercode`
    + `&timezone=Europe%2FBerlin`
    + `&start_date=${dateStr}&end_date=${dateStr}`;

  wxPending[key] = fetch(url)
    .then(r => r.json())
    .then(data => {
      const result = parseOpenMeteo(data, dayOffset);
      wxCache[key] = result;
      delete wxPending[key];
      return result;
    })
    .catch(() => {
      delete wxPending[key];
      const fb = fallbackWeather(id, dayOffset);
      wxCache[key] = fb;
      return fb;
    });

  return wxPending[key];
}

function parseOpenMeteo(data, dayOffset){
  const h = data.hourly;
  const month = new Date().getMonth();
  const maxDaylight = DAYLIGHT[month];
  const hours = [];
  for(let i = 7; i <= 21; i++){
    const temp = Math.round(h.temperature_2m[i] ?? 15);
    const rain = Math.round(h.precipitation_probability[i] ?? 30);
    const sunSec = h.sunshine_duration ? (h.sunshine_duration[i] ?? 0) : 0;
    const sunStrength = Math.min(1, sunSec / 3600);
    const wmo = h.weathercode ? (h.weathercode[i] ?? 0) : 0;
    hours.push({ h: i, temp, rain, icon: iconFromWMO(wmo, i), sunStrength, isDaylight: true });
  }
  return buildWxSummary(hours, maxDaylight, month, true);
}

function fallbackWeather(id, dayOffset){
  const month = new Date().getMonth();
  const maxDaylight = DAYLIGHT[month];
  const seed = id.split('').reduce((a,c)=>a+c.charCodeAt(0),0)*7 + dayOffset*99;
  const rng = n => Math.abs(Math.sin(seed*n*0.127+n*3.1))%1;
  const baseCloud = rng(1)*0.7;
  const monthTemp = [3,4,8,13,17,20,22,22,18,13,7,4][month];
  const hours = [];
  for(let h=7;h<=21;h++){
    const cf = Math.min(1,Math.max(0,baseCloud+(rng(h)-0.5)*0.3));
    const curve = Math.sin((h-6)/16*Math.PI);
    const temp = Math.round(monthTemp-4+curve*8+rng(h+10)*3);
    const rain = Math.round(cf>0.6?rng(h+20)*80:rng(h+20)*20);
    const sunStrength = Math.max(0,1-cf*1.6);
    const icon = cf>0.7?'☁️':cf>0.4?'⛅':cf>0.2?'🌤️':'☀️';
    hours.push({h,temp,rain,icon,sunStrength,isDaylight:true});
  }
  return buildWxSummary(hours, maxDaylight, month, false);
}

function buildWxSummary(hours, maxDaylight, month, isReal){
  const sunHours = Math.round(hours.reduce((s,x)=>s+x.sunStrength,0)*10)/10;
  const avgRain = Math.round(hours.reduce((s,x)=>s+x.rain,0)/hours.length);
  const maxRain = Math.max(...hours.map(x=>x.rain));
  const middayH = hours.find(x=>x.h===14)||hours[7];
  const temps = hours.map(x=>x.temp);
  return { hours, sunHours, avgRain, maxRain,
           middayTemp: middayH.temp,
           minTemp: Math.min(...temps), maxTemp: Math.max(...temps),
           good: sunHours>=3 && avgRain<50,
           maxDaylight, month, isReal };
}

function weatherScore(wx){ return wx ? wx.sunHours*10+(100-wx.avgRain)*0.4+wx.middayTemp*0.2 : 0; }

function getCachedWeather(id, dayOffset){ return wxCache[id+'_'+dayOffset]||null; }

async function preloadZone(zone){
  const dests = DEST.filter(d=>d.zone===zone);
  await Promise.all(dests.flatMap(d=>[fetchWeather(d.id,0),fetchWeather(d.id,1)]));
}

async function bestDest(zone){
  await preloadZone(zone);
  const scored = DEST.filter(d=>d.zone===zone).map(d=>({d, score:weatherScore(getCachedWeather(d.id,dayMode))}));
  return scored.sort((a,b)=>b.score-a.score)[0].d;
}

// KLEIDUNGSEMPFEHLUNG
function clothingAdvice(w){
  const t = w.middayTemp;
  const rain = w.maxRain;
  const spread = w.maxTemp - w.minTemp;

  let base, baseIcon;
  if(t < 5)        { baseIcon='🧥'; base='Winterjacke'; }
  else if(t < 10)  { baseIcon='🧥'; base='Warme Jacke'; }
  else if(t < 15)  { baseIcon='🧥'; base='Leichte Jacke'; }
  else if(t < 20)  { baseIcon='👕'; base='Langarm oder T-Shirt'; }
  else             { baseIcon='👕'; base='T-Shirt reicht'; }

  let extra = [];
  if(rain > 60)      extra.push('☂️ Regenjacke oder Schirm');
  else if(rain > 35) extra.push('🌂 Schirm einpacken');
  if(spread > 7)     extra.push('🧣 Abends Schichten drüber');

  return { icon: baseIcon, base, extra };
}

// SVG CHART generieren
function buildWeatherChart(w){
  const hrs = w.hours;
  const W = 380, H = 120;
  const padL=28, padR=10, padT=32, padB=36;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = hrs.length;

  const temps = hrs.map(x=>x.temp);
  const tMin = Math.min(...temps) - 2;
  const tMax = Math.max(...temps) + 2;

  const xOf = i => padL + (i/(n-1)) * chartW;
  const yOf = t => padT + chartH - ((t-tMin)/(tMax-tMin)) * chartH;

  // Rain bars (background)
  const rainBars = hrs.map((x,i)=>{
    const bw = chartW/n * 0.85;
    const bx = xOf(i) - bw/2;
    const bh = (x.rain/100) * chartH;
    const by = padT + chartH - bh;
    const alpha = (x.rain/100 * 0.55 + 0.05).toFixed(2);
    return `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="rgba(36,129,215,${alpha})" rx="2"/>`;
  }).join('');

  // Temp curve — smooth bezier
  const pts = hrs.map((x,i)=>({x:xOf(i), y:yOf(x.temp)}));
  let path = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for(let i=1;i<pts.length;i++){
    const prev=pts[i-1], curr=pts[i];
    const cx=(prev.x+curr.x)/2;
    path += ` C${cx.toFixed(1)},${prev.y.toFixed(1)} ${cx.toFixed(1)},${curr.y.toFixed(1)} ${curr.x.toFixed(1)},${curr.y.toFixed(1)}`;
  }
  // Fill under curve
  const fillPath = path + ` L${pts[n-1].x.toFixed(1)},${(padT+chartH).toFixed(1)} L${pts[0].x.toFixed(1)},${(padT+chartH).toFixed(1)} Z`;

  // Hour labels + icons (every 2h)
  const labels = hrs.filter((_,i)=>i%2===0).map((x,li)=>{
    const i = li*2;
    const xp = xOf(i);
    return `<text x="${xp.toFixed(1)}" y="${(H-4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#8a96a8">${x.h}h</text>
            <text x="${xp.toFixed(1)}" y="${(padT-4).toFixed(1)}" text-anchor="middle" font-size="10">${x.icon}</text>`;
  }).join('');

  // Temp labels at min/max
  const maxI = temps.indexOf(Math.max(...temps));
  const minI = temps.indexOf(Math.min(...temps));
  const tempLabels = `
    <text x="${xOf(maxI).toFixed(1)}" y="${(yOf(temps[maxI])-6).toFixed(1)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1a6bb5">${temps[maxI]}°</text>
    <text x="${xOf(minI).toFixed(1)}" y="${(yOf(temps[minI])+14).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="#8a96a8">${temps[minI]}°</text>`;

  // Rain % labels at peak rain hours
  const maxRainI = hrs.map(x=>x.rain).indexOf(Math.max(...hrs.map(x=>x.rain)));
  const rainLabel = hrs[maxRainI].rain > 20
    ? `<text x="${xOf(maxRainI).toFixed(1)}" y="${(padT + chartH * (1 - hrs[maxRainI].rain/100) - 4).toFixed(1)}" text-anchor="middle" font-size="8.5" fill="rgba(36,129,215,.8)">${hrs[maxRainI].rain}%</text>`
    : '';

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible">
    <defs>
      <linearGradient id="tempGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2481d7" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#2481d7" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    ${rainBars}
    <path d="${fillPath}" fill="url(#tempGrad)"/>
    <path d="${path}" fill="none" stroke="#1a6bb5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    ${labels}
    ${tempLabels}
    ${rainLabel}
  </svg>`;
}

function tl(t){ return {natur:'Natur',museum:'Museum',essen:'Essen',kinder:'Kind'}[t]||t; }
function primaryTag(tags){const prio=['museum','essen','natur','kinder'];return prio.find(p=>tags.includes(p))||tags[0];}

async function toggleDay(){
  dayMode = dayMode===0 ? 1 : 0;
  const tog = document.getElementById('day-toggle');
  const lH = document.getElementById('lbl-heute');
  const lM = document.getElementById('lbl-morgen');

}

/* ═══════════════ JOYSTICK ═══════════════ */
(function(){
  const arena=document.getElementById('arena');
  const h=document.getElementById('jh');
  const rd=document.getElementById('zread');
  const C=130;
  let drag=false,lx=C,ly=C,lastZ=null;
  const SNAP={nah:17,mittel:50,weit:82,sehrweit:115};
  function zFromDist(d){return d<34?'nah':d<66?'mittel':d<98?'weit':'sehrweit';}
  function moveTo(x,y){
    const rect=arena.getBoundingClientRect();
    const dx=x-rect.left-C,dy=y-rect.top-C;
    const dist=Math.min(Math.sqrt(dx*dx+dy*dy),128);
    const ang=Math.atan2(dy,dx);
    lx=C+Math.cos(ang)*dist;ly=C+Math.sin(ang)*dist;
    h.style.left=lx+'px';h.style.top=ly+'px';h.style.transform='none';
    const z=zFromDist(dist);
    if(z!==lastZ){lastZ=z;curZone=z;const m=ZMETA[z];rd.innerHTML=`<div class="zread-name">${m.label}</div><div class="zread-detail">${m.detail}</div>`;}
  }
  async function release(){
    drag=false;h.classList.remove('dragging');
    if(!curZone)return;
    const dx=lx-C,dy=ly-C,ang=Math.atan2(dy,dx),sr=SNAP[curZone];
    h.style.transition='left .28s cubic-bezier(.34,1.56,.64,1),top .28s cubic-bezier(.34,1.56,.64,1)';
    h.style.left=(C+Math.cos(ang)*sr)+'px';h.style.top=(C+Math.sin(ang)*sr)+'px';
    setTimeout(()=>h.style.transition='',300);
    showWeather(curZone);
  }
  h.addEventListener('mousedown',e=>{drag=true;h.classList.add('dragging');e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(drag)moveTo(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{if(drag)release();});
  h.addEventListener('touchstart',e=>{drag=true;h.classList.add('dragging');e.preventDefault();},{passive:false});
  document.addEventListener('touchmove',e=>{if(drag){moveTo(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
  document.addEventListener('touchend',()=>{if(drag)release();});
})();

function showLoadingCard(){
  const sec=document.getElementById('sec-weather');
  document.getElementById('sec-weather-label').textContent='⏳ Wetterdaten werden geladen…';
  document.getElementById('dest-card').innerHTML=`
    <div style="padding:40px;text-align:center;color:var(--muted);font-size:.85rem;">
      <div style="font-size:2rem;margin-bottom:10px;">🌤️</div>
      Echte Wetterdaten werden abgerufen…
    </div>`;
  sec.classList.add('show');
}

async function showWeather(zone){
  showLoadingCard();
  const best = await bestDest(zone);
  if(!best) return;
  await renderDestCard(best, zone, true);
}

async function selectDest(id){
  const d=DEST.find(x=>x.id===id);
  if(!d)return;
  closeDropdown();
  await renderDestCard(d,d.zone,false);
  if(document.getElementById('sec-activities').classList.contains('show')) showActivities();
}

async function renderDestCard(d,zone,isAuto){
  curDest=d;
  const w = await fetchWeather(d.id, dayMode);
  wxGood = w.good;
  const img=DEST_IMAGES[d.id]||'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&q=75';
  const travel=[d.car?`🚗 ${d.car}`:'',d.train?`🚆 ${d.train}`:''].filter(Boolean).join('  ·  ');

  // Header-Status
  let hCls,hTxt,hSub;
  if(w.sunHours>=5 && w.avgRain<35){hCls='sun';hTxt='☀️ Follow the Sun!';hSub=`${w.sunHours}h Sonne erwartet — perfekter Ausflugstag`;}
  else if(w.sunHours>=2 && w.avgRain<60){hCls='ok';hTxt='🌤 Guter Ausflugstag';hSub=`${w.sunHours}h Sonne möglich — Schichten einpacken`;}
  else{hCls='rain';hTxt='🌧 Heute lieber Indoor';hSub='Wenig Sonne, viel Regen — Museen warten!';}
  const realBadge = w.isReal
    ? `<div style="display:inline-flex;align-items:center;gap:4px;font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;background:#e8f7ee;color:#2a7a3a;border:1px solid #b0ddb8;border-radius:99px;padding:3px 9px;margin-bottom:10px;">✅ Echtzeit-Wetterdaten</div>`
    : `<div style="display:inline-flex;align-items:center;gap:4px;font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:99px;padding:3px 9px;margin-bottom:10px;">⚠️ Offline – Schätzwerte</div>`;
  // Kleidung
  const cloth = clothingAdvice(w);
  const clothHtml = `
    <div class="wx-clothing">
      <div class="wx-clothing-icon">${cloth.icon}</div>
      <div>
        <div class="wx-clothing-text">${cloth.base}${cloth.extra.length ? ' · ' + cloth.extra.join(' · ') : ''}</div>
        <div class="wx-clothing-sub">${w.minTemp}° früh · ${w.maxTemp}° mittags · ${w.minTemp+1}° abends</div>
      </div>
    </div>`;

  // Sonnenstunden-Balken
  const sunPct = Math.round((w.sunHours / w.maxDaylight) * 100);
  const sunRowHtml = `
    <div class="wx-sun-row">
      <div class="wx-sun-badge">☀️ ${w.sunHours}h Sonne</div>
      <div class="wx-sun-bar-wrap"><div class="wx-sun-bar" style="width:${sunPct}%"></div></div>
      <div style="font-size:.68rem;color:var(--muted);white-space:nowrap">von ${w.maxDaylight}h Tageslicht</div>
    </div>`;

  // SVG Chart
  const chartHtml = `
    <div class="wx-chart-wrap">
      <div class="wx-chart-label">Tagesverlauf ${dayMode===0?'Heute':'Morgen'} — Temperatur & Regen</div>
      <div class="wx-chart-scroll">
        <div class="wx-chart-svg-wrap">${buildWeatherChart(w)}</div>
      </div>
    </div>`;

  // Dropdown
  const zoneOrder=['nah','mittel','weit','sehrweit'];
  const zoneLabels={nah:'Nah · 0–30 Min',mittel:'Mittel · 30–90 Min',weit:'Weit · 90–120 Min',sehrweit:'Sehr weit · 120+ Min'};
  let ddHtml=`<div class="dropdown-zone-label" style="background:#e8f3fb;color:var(--blue2);">Wettersymbol = ${dayMode===0?'Heute':'Morgen'}</div>`;
  zoneOrder.forEach(z=>{
    ddHtml+=`<div class="dropdown-zone-label">${zoneLabels[z]}</div>`;
    DEST.filter(x=>x.zone===z).forEach(c=>{
      const cw = getCachedWeather(c.id, dayMode);
      const wxIcon = !cw?'⏳':cw.sunHours>=4?'☀️':cw.avgRain<50?'🌤️':'🌧️';
      const title = cw?`${cw.maxTemp}°C · ☀️${cw.sunHours}h`:'Laden…';
      ddHtml+=`<div class="dropdown-item ${c.id===d.id?'active':''}" onclick="selectDest('${c.id}')">
        <div><div class="dropdown-item-name">${c.name}</div><div class="dropdown-item-meta">${[c.car,c.train].filter(Boolean).join(' · ')}</div></div>
        <div class="dropdown-wx" title="${title}">${wxIcon}</div>
      </div>`;
    });
  });

  document.getElementById('sec-weather-label').textContent=isAuto?'⭐ Beste Empfehlung nach Wetter':'✏️ Manuell ausgewählt';
  const outdoorBtn = !wxGood ? `<button class="outdoor-btn" onclick="showOutdoorEvents()">🌞 Outdoor Events anzeigen</button>` : '';

  document.getElementById('dest-card').innerHTML=`
    <div class="dest-img" style="background-image:url('${img}')">
      <div class="dest-img-overlay"></div>
      <div class="dest-img-label">
        <div class="dest-img-name">${d.name}</div>
        <div class="dest-img-travel">${travel}</div>
      </div>
    </div>
    <div class="dest-row">
      <div class="dest-row-left">
        <div class="dest-row-name">${d.name}</div>
        <div class="dest-row-travel">${travel}</div>
        ${isAuto?'<div class="dest-best-badge">⭐ Meiste Sonne in dieser Zone</div>':''}
      </div>
      <div class="dest-dropdown-wrap">
        <button class="dest-dropdown-btn" id="dd-btn" onclick="toggleDropdown(event)">
          Andere Stadt
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="dest-dropdown-menu" id="dd-menu">${ddHtml}</div>
      </div>
    </div>
    <div class="weather-strip">
      ${realBadge}
      <div class="weather-head ${hCls}">${hTxt}</div>
      <div class="weather-sub">${hSub}</div>
      ${outdoorBtn}
    </div>
    ${sunRowHtml}
    ${chartHtml}
    ${clothHtml}
    <button class="btn-explore" onclick="showActivities()">Aktivitäten entdecken →</button>`;

  // Position dropdown correctly after render
  const sec=document.getElementById('sec-weather');
  sec.classList.add('show');
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

/* Dropdown */
function toggleDropdown(e){
  e.stopPropagation();
  const btn=document.getElementById('dd-btn');
  const menu=document.getElementById('dd-menu');
  if(!menu)return;
  const isOpen=menu.classList.contains('open');
  if(isOpen){closeDropdown();}
  else{
    menu.classList.add('open');
    btn.classList.add('open');
  }
}
function closeDropdown(){
  const btn=document.getElementById('dd-btn');
  const menu=document.getElementById('dd-menu');
  if(btn)btn.classList.remove('open');
  if(menu)menu.classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.dest-dropdown-wrap'))closeDropdown();
});

function showOutdoorEvents(){
  alert(`Events für ${dayMode===0?'heute':'morgen'} — diese Funktion wird später über rausgegangen.de oder eine API verbunden. Bleibt spannend! 🎉`);
}

/* ═══════════════ ACTIVITIES ═══════════════ */
function showActivities(){
  activeFilter='alle';
  document.querySelectorAll('.chip[data-f]').forEach(c=>{
    c.classList.remove('on','off');
    if(c.dataset.f==='alle')c.classList.add('on');
    if(c.dataset.f==='natur'&&!wxGood)c.classList.add('off');
  });
  document.getElementById('acts-title').textContent=`Was tun in ${curDest.name}?`;
  const dayLabel = dayMode===0 ? 'heute' : 'morgen';
  document.getElementById('acts-sub').textContent=wxGood
    ?`Schönes Wetter ${dayLabel} — alles ist eine Option 🌿`
    :`${dayMode===0?'Heute':'Morgen'} lieber Indoor — Outdoor-Tipps ausgeblendet 🌧`;
  renderCards();
  const sec=document.getElementById('sec-activities');
  sec.classList.add('show');
  setTimeout(()=>sec.scrollIntoView({behavior:'smooth',block:'start'}),80);
}

function setFilter(f){
  if(f==='natur'&&!wxGood)return;
  activeFilter=f;
  document.querySelectorAll('.chip[data-f]').forEach(c=>c.classList.toggle('on',c.dataset.f===f));
  renderCards();
}

// Pool state: one displayed item per pool per render session
const shownPoolItems = {};

function refreshPool(poolId, destId){
  const dest = DEST.find(d=>d.id===destId);
  if(!dest)return;
  const allActs = dest.activities(wxGood);
  const poolActs = allActs.filter(a=>a.pool===poolId);
  if(!poolActs.length)return;
  const current = shownPoolItems[poolId]||0;
  const poolAll = poolActs[0].poolAll||[];
  const next = (current+1) % poolAll.length;
  shownPoolItems[poolId] = next;
  renderCards();
}

function renderCards(){
  if(!curDest)return;
  let allActs=curDest.activities(wxGood);
  // Resolve pools: one item per pool, using current index
  const seen={};
  let list=[];
  allActs.forEach(a=>{
    if(a.pool){
      if(!seen[a.pool]){
        seen[a.pool]=true;
        const idx = shownPoolItems[a.pool]||0;
        const src = a.poolAll||[];
        const item = src.length>0 ? src[idx % src.length] : null;
        // Merge: pool item overrides name/desc/maps/rq, but keep tags and pool from parent
        list.push(item ? {...item, tags:a.tags, pool:a.pool, poolAll:a.poolAll} : a);
      }
    } else {
      list.push(a);
    }
  });

  // Filter
  if(activeFilter==='kinder'){
    list=list.filter(a=>a.tags.includes('kinder'));
  } else if(activeFilter!=='alle'){
    list=list.filter(a=>a.tags[0]===activeFilter);
  }
  if(!wxGood) list=[...list].sort((a,b)=>(a.tags[0]==='natur'?1:0)-(b.tags[0]==='natur'?1:0));

  const el=document.getElementById('act-list');
  if(!list.length){el.innerHTML='<div class="empty">Keine Vorschläge für diesen Filter.</div>';return;}

  el.innerHTML=list.map((a,i)=>{
    const pt=primaryTag(a.tags);
    const mUrl=`https://maps.google.com/?q=${encodeURIComponent(a.maps||a.name)}`;
    const refreshBtn=a.pool&&(a.poolAll||[]).length>1
      ?`<button class="abtn-refresh" onclick="refreshPool('${a.pool}','${curDest.id}')" title="Andere Option anzeigen"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg></button>`
      :'';
    return `<div class="acard" style="animation-delay:${i*.05}s">
      <div class="acard-bar bar-${pt}"></div>
      <div class="acard-body">
        <div class="acard-top">
          <div class="acard-name">${a.name}</div>
          <span class="tag tag-${pt}">${tl(pt)}</span>
        </div>
        <div class="acard-desc">${a.desc}</div>
        <div class="acard-btns">
          <a class="abtn abtn-primary" href="${mUrl}" target="_blank">📍 Route</a>
          ${refreshBtn}
        </div>
      </div>
    </div>`;
  }).join('');
}
